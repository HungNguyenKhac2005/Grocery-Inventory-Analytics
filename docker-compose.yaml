version: "3.8"

services:
  postgres:
    image:
    environment:
      POSTGRES_USER:
      POSTGRES_PASSWORD:
      POSTGRES_DB:
    ports:
      - ""

    healthcheck:
      test:
      interval:
      retries:
      start_period:

  airflow-init:
    image:
    user: ""
    depends_on:
      postgres:
        condition:
    environment:
      AIRFLOW__CORE__EXECUTOR:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN:
      _PIP_ADDITIONAL_REQUIREMENTS:
      AIRFLOW__WEBSERVER__SECRET_KEY:
    volumes:

    command: >

  airflow-webserver:
    image:
    user:
    depends_on:
      airflow-init:
        condition:
    environment:
      AIRFLOW__CORE__EXECUTOR:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN:
      AIRFLOW__CORE__LOAD_EXAMPLES:
      _PIP_ADDITIONAL_REQUIREMENTS:
      AIRFLOW__WEBSERVER__SECRET_KEY:
    volumes:
      -
    ports:
      -
    command:

  airflow-scheduler:
    image:
    user:
    depends_on:
      airflow-init:
        condition:
    environment:
      AIRFLOW__CORE__EXECUTOR: r
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN:
      _PIP_ADDITIONAL_REQUIREMENTS:
      AIRFLOW__WEBSERVER__SECRET_KEY:
    volumes:
      -
    command:
